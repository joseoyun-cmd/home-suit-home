<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Suit Home - Investigation Agency</title>
    <!-- Google Fonts: Special Elite -->
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Special Elite', serif;
            background-color: #0a0a0a;
            margin: 0;
            overflow: hidden;
        }

        /* Vintage Scrollbar */
        .scrollbar-vintage::-webkit-scrollbar {
            width: 8px;
        }
        .scrollbar-vintage::-webkit-scrollbar-track {
            background: rgba(58, 45, 36, 0.05);
        }
        .scrollbar-vintage::-webkit-scrollbar-thumb {
            background: #3a2d24;
            border: 1px solid #d2c1a8;
        }

        /* Texture Overlays */
        .paper-texture {
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            pointer-events: none;
            opacity: 0.4;
        }

        .map-texture {
            background-image: url('https://www.transparenttextures.com/patterns/old-map.png');
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.7s ease forwards;
        }

        /* Stamp Effect */
        .stamp {
            opacity: 0.08;
            transform: rotate(-15deg);
            border: 4px solid #8b0000;
            color: #8b0000;
            padding: 4px 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-0 md:p-6 text-[#2a221b]">

    <!-- Main Container -->
    <div class="relative w-full max-w-4xl h-screen md:h-[90vh] bg-[#d2c1a8] shadow-[0_0_80px_rgba(0,0,0,1)] flex overflow-hidden border-b-8 border-r-8 border-[#3a2d24]">
        
        <!-- Content Area -->
        <div class="flex-1 flex flex-col relative map-texture bg-repeat">
            <div class="flex-1 flex flex-col h-full bg-[#e8dcc4]/85 relative shadow-inner">
                
                <!-- Texture Overlay -->
                <div class="absolute inset-0 paper-texture"></div>
                
                <!-- Header -->
                <div class="px-6 py-5 border-b border-[#3a2d24]/20 flex justify-between items-center z-10 bg-[#e8dcc4]/60 backdrop-blur-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-2.5 h-2.5 bg-[#8b0000] rounded-full animate-pulse shadow-[0_0_8px_#8b0000]"></div>
                        <h1 class="text-xl font-black uppercase tracking-[0.3em] text-[#3a2d24]">Home Suit Home</h1>
                    </div>
                    <div class="flex gap-4">
                        <button id="config-btn" class="text-[#3a2d24]/40 hover:text-[#8b0000] transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Chat Display Area -->
                <div id="chat-container" class="flex-1 overflow-y-auto p-6 md:p-10 space-y-8 scrollbar-vintage z-0">
                    <div class="animate-fade-in">
                        <div class="relative flex flex-col p-6 border-b border-[#3a2d24]/10">
                            <div class="absolute top-6 right-6 stamp">VERIFIED</div>
                            <div class="flex items-center gap-3 mb-3">
                                <div class="w-1.5 h-1.5 rounded-full bg-[#8b0000]"></div>
                                <span class="text-[12px] font-black uppercase tracking-widest text-[#3a2d24]">조수</span>
                            </div>
                            <p class="text-[#2a221b] text-lg leading-relaxed font-medium">친애하는 탐정님, 장원에 오신 것을 환영합니다. 조사가 필요하시면 언제든 말씀하십시오.</p>
                        </div>
                    </div>
                </div>

                <!-- Typing Indicator -->
                <div id="typing-indicator" class="hidden px-8 py-2 italic text-sm text-[#3a2d24]/40 animate-pulse flex items-center gap-2">
                    <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    조수가 기록 중...
                </div>

                <!-- Input Field Area -->
                <div class="p-6 bg-[#b5a285]/20 border-t border-[#3a2d24]/15">
                    <div class="flex items-center gap-4 bg-[#e8dcc4] border-2 border-[#3a2d24] p-1 shadow-[4px_4px_0px_#3a2d24] focus-within:shadow-[6px_6px_0px_#3a2d24] transition-all">
                        <input 
                            type="text" 
                            id="user-input" 
                            placeholder="단서를 입력하십시오..."
                            class="flex-1 bg-transparent p-3 outline-none text-lg placeholder:italic text-[#2a221b]"
                        >
                        <button 
                            id="send-btn"
                            class="bg-[#3a2d24] text-[#e8dcc4] px-6 py-3 font-bold uppercase text-xs hover:bg-[#1a1410] transition-colors"
                        >
                            Transmit
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Config Modal -->
        <div id="config-modal" class="hidden absolute inset-0 z-50 bg-[#1a1410]/80 flex items-center justify-center p-4 backdrop-blur-sm">
            <div class="bg-[#d2c1a8] w-full max-w-lg border-4 border-[#3a2d24] p-8 shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-black tracking-widest uppercase text-[#3a2d24]">Agency Config</h2>
                    <button id="close-modal"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-black text-[#8b0000] uppercase block mb-1">Persona</label>
                        <textarea id="system-prompt" class="w-full h-24 bg-white/40 border border-[#3a2d24] p-3 text-sm outline-none focus:bg-white/60 transition-all font-sans"></textarea>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-[#8b0000] uppercase block mb-1">Knowledge Base</label>
                        <textarea id="knowledge-base" class="w-full h-32 bg-white/40 border border-[#3a2d24] p-3 text-sm outline-none focus:bg-white/60 transition-all font-sans"></textarea>
                    </div>
                    <button id="save-config" class="w-full bg-[#3a2d24] text-[#d2c1a8] py-3 font-bold hover:bg-[#1a1410] transition-all">Save Configuration</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- State ---
        let messages = [
            { role: 'assistant', content: '친애하는 탐정님, 장원에 오신 것을 환영합니다. 조사가 필요하시면 언제든 말씀하십시오.' }
        ];
        let systemPrompt = "당신은 'HOME SUIT HOME' 게임의 유능하고 차분한 조수(Assistant)입니다. 1920년대 런던의 탐정 조수 같은 말투를 사용하면서도, 현대 한국의 주택임대차보호법에 정통한 전문가입니다.";
        let knowledgeBase = "전세사기 유형, 대항력, 확정일자, 근저당권 등 부동산 법률 지식.";
        
        // API 키 설정 (공백일 경우 시스템 제공 키 사용)
        const apiKey = ""; 

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');
        const configBtn = document.getElementById('config-btn');
        const configModal = document.getElementById('config-modal');
        const closeModal = document.getElementById('close-modal');
        const saveConfig = document.getElementById('save-config');
        const systemPromptArea = document.getElementById('system-prompt');
        const knowledgeBaseArea = document.getElementById('knowledge-base');

        function renderMessages() {
            chatContainer.innerHTML = '';
            messages.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'animate-fade-in';
                const isUser = msg.role === 'user';
                msgDiv.innerHTML = `
                    <div class="relative flex flex-col p-6 border-b border-[#3a2d24]/10 ${isUser ? 'bg-[#3a2d24]/5 italic' : 'bg-transparent'}">
                        ${!isUser ? '<div class="absolute top-6 right-6 stamp">VERIFIED</div>' : ''}
                        <div class="flex items-center gap-3 mb-3">
                            <div class="w-1.5 h-1.5 rounded-full ${isUser ? 'bg-[#3a2d24]/30' : 'bg-[#8b0000]'}"></div>
                            <span class="text-[12px] font-black uppercase tracking-widest text-[#3a2d24]">
                                ${isUser ? '탐정' : '조수'}
                            </span>
                        </div>
                        <p class="text-[#2a221b] text-lg leading-relaxed font-medium whitespace-pre-wrap">${msg.content}</p>
                    </div>
                `;
                chatContainer.appendChild(msgDiv);
            });
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 지수 백오프 기반 재시도 함수
        async function fetchWithRetry(url, options, maxRetries = 5) {
            let lastError;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    const data = await response.json();
                    
                    if (response.ok) return data;
                    
                    // 429 Too Many Requests (Quota) 대응
                    if (response.status === 429) {
                        const waitTime = Math.pow(2, i) * 1000;
                        await new Promise(res => setTimeout(res, waitTime));
                        continue;
                    }
                    
                    throw new Error(data.error?.message || `HTTP ${response.status}`);
                } catch (err) {
                    lastError = err;
                }
            }
            throw lastError;
        }

        async function fetchAIResponse(history) {
            const systemInstruction = `${systemPrompt}\n\n[Background Knowledge]\n${knowledgeBase}`;
            
            // 지원되는 모델인 gemini-2.5-flash-preview-09-2025로 변경
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const contents = history.map(m => ({
                role: m.role === 'assistant' ? 'model' : 'user',
                parts: [{ text: m.content }]
            }));

            const options = {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: contents,
                    systemInstruction: { parts: [{ text: systemInstruction }] },
                    generationConfig: { 
                        temperature: 0.7, 
                        maxOutputTokens: 1024,
                        topP: 0.95
                    }
                })
            };

            const data = await fetchWithRetry(apiUrl, options);
            const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!aiText) throw new Error('AI로부터 유효한 응답을 받지 못했습니다.');
            return aiText;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || !typingIndicator.classList.contains('hidden')) return;

            messages.push({ role: 'user', content: text });
            userInput.value = '';
            renderMessages();
            
            typingIndicator.classList.remove('hidden');
            typingIndicator.classList.add('flex');

            try {
                const aiResponse = await fetchAIResponse(messages);
                messages.push({ role: 'assistant', content: aiResponse });
            } catch (error) {
                console.error(error);
                let msg = error.message;
                if (msg.includes("quota")) msg = "API 사용 한도가 초과되었습니다.";
                
                messages.push({ 
                    role: 'assistant', 
                    content: `[수사 일지: 통신 오류]\n${msg}\n\n잠시 후 다시 시도해 주십시오.` 
                });
            } finally {
                renderMessages();
                typingIndicator.classList.add('hidden');
                typingIndicator.classList.remove('flex');
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

        configBtn.addEventListener('click', () => {
            systemPromptArea.value = systemPrompt;
            knowledgeBaseArea.value = knowledgeBase;
            configModal.classList.remove('hidden');
        });

        closeModal.addEventListener('click', () => configModal.classList.add('hidden'));

        saveConfig.addEventListener('click', () => {
            systemPrompt = systemPromptArea.value;
            knowledgeBase = knowledgeBaseArea.value;
            configModal.classList.add('hidden');
            messages.push({ role: 'assistant', content: '탐정님, 새로운 수사 방침을 수립했습니다.' });
            renderMessages();
        });

        renderMessages();
    </script>
</body>
</html>
