<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Home Suit Home - Investigation Agency</title>
    <!-- Google Fonts: Special Elite (Vintage Typewriter Style) -->
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-brown: #3a2d24;
            --paper-bg: #e8dcc4;
            --accent-red: #8b0000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            height: 100dvh; /* 모바일 주소창 대응 동적 높이 */
            overflow: hidden;
            background-color: #0a0a0a;
            font-family: 'Special Elite', serif;
        }

        /* Vintage Scrollbar */
        .scrollbar-vintage::-webkit-scrollbar {
            width: 6px;
        }
        .scrollbar-vintage::-webkit-scrollbar-track {
            background: rgba(58, 45, 36, 0.05);
        }
        .scrollbar-vintage::-webkit-scrollbar-thumb {
            background: var(--primary-brown);
        }

        /* Texture Overlays */
        .paper-texture {
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            pointer-events: none;
            opacity: 0.4;
        }

        .map-texture {
            background-image: url('https://www.transparenttextures.com/patterns/old-map.png');
        }

        /* Stamp Effect */
        .stamp {
            opacity: 0.15;
            transform: rotate(-15deg);
            border: 4px solid var(--accent-red);
            color: var(--accent-red);
            padding: 4px 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease forwards;
        }
        
        /* Vercel 전체화면 컨테이너 */
        .app-container {
            width: 100%;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background-color: #d2c1a8;
            position: relative;
        }
    </style>
</head>
<body class="text-[#2a221b]">

    <!-- md:border-l-8 제거 및 mx-auto 설정을 통해 좌우 균형을 맞춤 -->
    <div class="app-container shadow-2xl mx-auto max-w-full overflow-hidden">
        <!-- Content Area -->
        <div class="flex-1 flex flex-col relative map-texture bg-repeat overflow-hidden">
            <div class="flex-1 flex flex-col h-full bg-[#e8dcc4]/90 relative shadow-inner overflow-hidden">
                
                <!-- Texture Overlay -->
                <div class="absolute inset-0 paper-texture"></div>
                
                <!-- Header -->
                <div class="px-6 py-4 border-b border-[#3a2d24]/20 flex justify-between items-center z-10 bg-[#e8dcc4]/80 backdrop-blur-md">
                    <div class="flex items-center gap-3">
                        <div class="w-2.5 h-2.5 bg-[#8b0000] rounded-full animate-pulse shadow-[0_0_8px_#8b0000]"></div>
                        <h1 class="text-lg md:text-xl font-black uppercase tracking-[0.2em] md:tracking-[0.3em] text-[#3a2d24] truncate">Home Suit Home</h1>
                    </div>
                    <button id="config-btn" class="p-2 text-[#3a2d24]/50 hover:text-[#8b0000] transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>

                <!-- Chat Display Area -->
                <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-10 space-y-6 scrollbar-vintage z-0">
                    <!-- Initial Message -->
                    <div class="animate-fade-in">
                        <div class="relative flex flex-col p-6 border-b border-[#3a2d24]/10">
                            <div class="absolute top-6 right-6 stamp">VERIFIED</div>
                            <div class="flex items-center gap-3 mb-3">
                                <div class="w-1.5 h-1.5 rounded-full bg-[#8b0000]"></div>
                                <span class="text-[12px] font-black uppercase tracking-widest text-[#3a2d24]">조수</span>
                            </div>
                            <p class="text-[#2a221b] text-lg leading-relaxed font-medium">친애하는 탐정님, 장원에 오신 것을 환영합니다. 조사가 필요하시면 언제든 말씀하십시오.</p>
                        </div>
                    </div>
                </div>

                <!-- Typing Indicator -->
                <div id="typing-indicator" class="hidden px-8 py-4 italic text-sm text-[#3a2d24]/50 animate-pulse flex items-center gap-2">
                    <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    조수가 기록 보관함을 확인 중...
                </div>

                <!-- Input Field Area -->
                <div class="p-4 md:p-6 bg-[#b5a285]/20 border-t border-[#3a2d24]/15">
                    <div class="max-w-4xl mx-auto flex items-center gap-2 md:gap-4 bg-[#e8dcc4] border-2 border-[#3a2d24] p-1 shadow-[4px_4px_0px_#3a2d24] focus-within:shadow-[6px_6px_0px_#3a2d24] transition-all">
                        <input 
                            type="text" 
                            id="user-input" 
                            placeholder="단서를 입력하십시오..."
                            class="flex-1 bg-transparent p-2 md:p-3 outline-none text-base md:text-lg placeholder:italic text-[#2a221b]"
                            autocomplete="off"
                        >
                        <button 
                            id="send-btn"
                            class="bg-[#3a2d24] text-[#e8dcc4] px-4 md:px-6 py-2 md:py-3 font-bold uppercase text-[10px] md:text-xs hover:bg-[#1a1410] transition-colors flex items-center gap-2"
                        >
                            <span>Transmit</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Config Modal -->
        <div id="config-modal" class="hidden fixed inset-0 z-50 bg-[#1a1410]/90 flex items-center justify-center p-4 backdrop-blur-sm">
            <div class="bg-[#d2c1a8] w-full max-w-lg border-4 border-[#3a2d24] p-6 md:p-8 shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-black tracking-widest uppercase text-[#3a2d24] flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8b0000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                        Agency Config
                    </h2>
                    <button id="close-modal" class="text-[#3a2d24] hover:text-[#8b0000]">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-black text-[#8b0000] uppercase block mb-1">Persona</label>
                        <textarea id="system-prompt" class="w-full h-24 bg-white/40 border border-[#3a2d24] p-3 text-sm outline-none focus:bg-white/60 transition-all font-sans"></textarea>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-[#8b0000] uppercase block mb-1">Knowledge Base</label>
                        <textarea id="knowledge-base" class="w-full h-32 bg-white/40 border border-[#3a2d24] p-3 text-sm outline-none focus:bg-white/60 transition-all font-sans"></textarea>
                    </div>
                    <button id="save-config" class="w-full bg-[#3a2d24] text-[#d2c1a8] py-3 font-bold hover:bg-[#1a1410] transition-all">Apply Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        let messages = [
            { role: 'assistant', content: '친애하는 탐정님, 장원에 오신 것을 환영합니다. 조사가 필요하시면 언제든 말씀하십시오.' }
        ];
        let systemPrompt = "당신은 'HOME SUIT HOME' 게임의 유능하고 차분한 조수(Assistant)입니다. 1920년대 런던의 탐정 조수 같은 말투를 사용하면서도, 현대 한국의 주택임대차보호법에 정통한 전문가입니다.";
        let knowledgeBase = "전세사기 유형, 대항력, 확정일자, 근저당권 등 부동산 법률 지식.";
        
        // API Key (Provided by user)
        const apiKey = "AIzaSyAcIisPQHdKrNYx0T13ADC38h64ntWY7qM"; 

        // DOM Elements
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');
        const configBtn = document.getElementById('config-btn');
        const configModal = document.getElementById('config-modal');
        const closeModal = document.getElementById('close-modal');
        const saveConfig = document.getElementById('save-config');
        const systemPromptArea = document.getElementById('system-prompt');
        const knowledgeBaseArea = document.getElementById('knowledge-base');

        // Render functions
        function createMessageElement(msg) {
            const isUser = msg.role === 'user';
            const msgDiv = document.createElement('div');
            msgDiv.className = 'animate-fade-in';
            msgDiv.innerHTML = `
                <div class="relative flex flex-col p-5 md:p-6 border-b border-[#3a2d24]/10 ${isUser ? 'bg-[#3a2d24]/5 italic' : 'bg-transparent'}">
                    ${!isUser ? '<div class="absolute top-6 right-6 stamp text-xs md:text-sm">VERIFIED</div>' : ''}
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-1.5 h-1.5 rounded-full ${isUser ? 'bg-[#3a2d24]/30' : 'bg-[#8b0000]'}"></div>
                        <span class="text-[10px] md:text-[12px] font-black uppercase tracking-widest text-[#3a2d24]">
                            ${isUser ? '탐정' : '조수'}
                        </span>
                    </div>
                    <p class="text-[#2a221b] text-base md:text-lg leading-relaxed font-medium whitespace-pre-wrap">${msg.content}</p>
                </div>
            `;
            return msgDiv;
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // API Call with Retry Logic
        async function fetchAIResponse(chatHistory) {
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const delays = [1000, 2000, 4000, 8000, 16000];
            
            const payload = {
                contents: chatHistory.map(m => ({
                    role: m.role === 'assistant' ? 'model' : 'user',
                    parts: [{ text: m.content }]
                })),
                systemInstruction: { parts: [{ text: `${systemPrompt}\n\n[수사 참고 지식]\n${knowledgeBase}` }] }
            };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "조사가 난항을 겪고 있습니다.";
                } catch (err) {
                    if (i === 4) throw err;
                    await new Promise(r => setTimeout(r, delays[i]));
                }
            }
        }

        // Event Handlers
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || !typingIndicator.classList.contains('hidden')) return;

            const userMsg = { role: 'user', content: text };
            messages.push(userMsg);
            chatContainer.appendChild(createMessageElement(userMsg));
            userInput.value = '';
            scrollToBottom();
            
            typingIndicator.classList.remove('hidden');
            typingIndicator.classList.add('flex');

            try {
                const response = await fetchAIResponse(messages);
                const aiMsg = { role: 'assistant', content: response };
                messages.push(aiMsg);
                chatContainer.appendChild(createMessageElement(aiMsg));
            } catch (error) {
                const errMsg = { role: 'assistant', content: `[통신 두절] 수사 조수와의 연결이 원활하지 않습니다. 사유: ${error.message}` };
                messages.push(errMsg);
                chatContainer.appendChild(createMessageElement(errMsg));
            } finally {
                typingIndicator.classList.add('hidden');
                typingIndicator.classList.remove('flex');
                scrollToBottom();
            }
        }

        // Listeners
        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSend(); });

        configBtn.addEventListener('click', () => {
            systemPromptArea.value = systemPrompt;
            knowledgeBaseArea.value = knowledgeBase;
            configModal.classList.remove('hidden');
        });

        closeModal.addEventListener('click', () => configModal.classList.add('hidden'));

        saveConfig.addEventListener('click', () => {
            systemPrompt = systemPromptArea.value;
            knowledgeBase = knowledgeBaseArea.value;
            configModal.classList.add('hidden');
            const confirmMsg = { role: 'assistant', content: '탐정님, 새로운 수사 방침이 수립되었습니다.' };
            messages.push(confirmMsg);
            chatContainer.appendChild(createMessageElement(confirmMsg));
            scrollToBottom();
        });

        // Initial Scroll
        scrollToBottom();
    </script>
</body>
</html>
